name: vonage_video_bridge
description: Flutter bridge for the official native Vonage/OpenTok Video SDKs.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.vonage_video_bridge
        pluginClass: VonageVideoBridgePlugin
      ios:
        pluginClass: VonageVideoBridgePlugin
